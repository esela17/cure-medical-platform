<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مقالات طبية | كيور — رعاية صحية منزلية في الفيوم</title>
    <meta name="description" content="مقالات طبية متخصصة من أطباء وممرضين معتمدين — نصائح صحية عملية تخص رعاية المرضى في المنزل، السيطرة على الأمراض المزمنة، وأهمية التمريض المنزلي المحترف." />
    <link rel="icon" type="image/png" href="assets/png/logo-cure-new.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <style>
        :root {
            --bg: #0F0C29;
            --bg-gradient: linear-gradient(135deg, #0F0C29 0%, #302B63 50%, #24243E 100%);
            --card-bg: rgba(30, 26, 61, 0.6);
            --purple: #6B5CE7;
            --green: #7ED957;
            --white: #FFFFFF;
            --light: #C8C4E0;
            --muted: #94A3B8;
            --border: rgba(107, 92, 231, 0.2);
            --radius: 24px;
            --radius-sm: 16px;
            --font-main: 'Cairo', sans-serif;
            --font-body: 'Tajawal', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--white);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* Navigation (Same as articles) */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo img { height: 45px; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--light); text-decoration: none; font-weight: 600; font-family: var(--font-main); transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--green); }

        /* Hero Section */
        .hero { padding: 80px 0 60px; text-align: center; }
        .hero h1 { font-family: var(--font-main); font-size: clamp(32px, 6vw, 56px); font-weight: 900; margin-bottom: 20px; }
        .hero p { font-size: 18px; color: var(--light); max-width: 700px; margin: 0 auto 40px; }

        /* Search & Filter */
        .controls { display: flex; flex-direction: column; gap: 20px; margin-bottom: 60px; }
        .search-box {
            position: relative; max-width: 600px; margin: 0 auto; width: 100%;
        }
        .search-box input {
            width: 100%; padding: 18px 50px 18px 20px; border-radius: 50px;
            background: var(--card-bg); border: 2px solid var(--border);
            color: var(--white); font-family: var(--font-body); font-size: 16px;
            outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--purple); box-shadow: 0 0 20px rgba(107, 92, 231, 0.3); }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        /* Grid */
        .articles-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px; margin-bottom: 80px;
        }
        @media (max-width: 768px) { .articles-grid { grid-template-columns: 1fr; } }

        .art-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            display: flex; flex-direction: column; transition: 0.4s;
            cursor: pointer; text-decoration: none; color: inherit;
        }
        .art-card:hover { transform: translateY(-10px); border-color: var(--green); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .art-img { position: relative; width: 100%; height: 220px; overflow: hidden; }
        .art-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .art-card:hover .art-img img { scale: 1.1; }
        
        .art-body { padding: 30px; display: flex; flex-direction: column; flex-grow: 1; }
        .art-body h3 { font-family: var(--font-main); font-size: 20px; font-weight: 800; margin-bottom: 15px; color: var(--white); line-height: 1.4; }
        .art-body p { font-size: 14px; color: var(--light); margin-bottom: 25px; flex-grow: 1; opacity: 0.8; }
        
        .art-footer { 
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 20px; border-top: 1px solid var(--border);
        }
        .read-more { color: var(--green); font-weight: 700; font-family: var(--font-main); display: flex; align-items: center; gap: 8px; font-size: 14px; }

        /* Footer */
        footer { padding: 60px 0; border-top: 1px solid var(--border); text-align: center; color: var(--muted); margin-top: 80px; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 100px 0; display: none; }
        .empty-state i { font-size: 60px; color: var(--muted); margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <div class="container nav-inner">
        <a href="index.html" class="nav-logo"><img src="assets/png/logo-cure-new.png" alt="كيور CURE"></a>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="articles.html" class="active">المقالات</a></li>
            <li><a href="careers.html">الوظائف</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h1>الثقافة الصحية المتكاملة</h1>
        <p>موسوعة كيور الطبية توفر لك معلومات موثوقة ومبسطة للعناية بصحة أسرتك في المنزل.</p>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="articleSearch" placeholder="ابحث عن موضوع طبي (مثلاً: سكري، جروح...)" />
                <i class="fas fa-search"></i>
            </div>
        </div>
    </div>

    <div class="articles-grid" id="articlesContainer">
        <!-- Articles will be loaded here dynamically -->
    </div>

    <div class="empty-state" id="emptyState">
        <i class="fas fa-search"></i>
        <h3>عذراً، لم نجد مقالات تطابق بحثك</h3>
        <p>حاول البحث بكلمات أخرى أو تصفح جميع المقالات.</p>
    </div>
</div>

<footer>
    <div class="container">
        <p>© 2025 جميع الحقوق محفوظة لمنصة كيور CURE — شريكك في الرعاية المنزلية</p>
    </div>
</footer>

<script>
    let articles = [];

    async function loadArticles() {
        try {
            const response = await fetch('articles_catalog.json');
            articles = await response.json();
            renderArticles(articles);
        } catch (error) {
            console.error("Error loading articles:", error);
            // Fallback content if fetch fails or running locally
            articles = [
                { title: "تمريض منزلي في الفيوم", slug: "tamreed-manzili-fayoum", desc: "دليل شامل لأفضل خدمات التمريض المنزلي في الفيوم لعام 2025.", image: "article1.png" },
                { title: "أعراض السكري النوع الثاني", slug: "arad-marad-alsukkar-annoa-althani", desc: "كيف تتعرف على أعراض السكري المبكرة وكيفية المتابعة.", image: "article2.png" }
            ];
            renderArticles(articles);
        }
    }

    function renderArticles(list) {
        const container = document.getElementById('articlesContainer');
        const emptyState = document.getElementById('emptyState');
        
        container.innerHTML = '';
        
        if (list.length === 0) {
            emptyState.style.display = 'block';
            return;
        }
        
        emptyState.style.display = 'none';
        
        list.forEach((art, index) => {
            const card = document.createElement('a');
            card.className = 'art-card';
            card.href = `${art.slug}.html`;
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transitionDelay = `${index * 0.1}s`;
            
            card.innerHTML = `
                <div class="art-img">
                    <img src="assets/img/articles/${art.image}" alt="${art.title}">
                </div>
                <div class="art-body">
                    <h3>${art.title}</h3>
                    <p>${art.desc}</p>
                    <div class="art-footer">
                        <span class="read-more">اقرأ المزيد <i class="fas fa-arrow-left"></i></span>
                    </div>
                </div>
            `;
            
            container.appendChild(card);
            
            // Trigger animation
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 50);
        });
    }

    document.getElementById('articleSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = articles.filter(art => 
            art.title.toLowerCase().includes(query) || 
            art.desc.toLowerCase().includes(query)
        );
        renderArticles(filtered);
    });

    window.onload = loadArticles;
</script>

</body>
</html>
